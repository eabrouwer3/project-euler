services:
  runner:
    build: ./runner
    ports:
      - "3001:3001"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: euler
      POSTGRES_PASSWORD: euler
      POSTGRES_DB: euler
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
